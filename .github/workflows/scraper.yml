name: Wells Price Scraper

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC = 08:00 Lisboa (verao) + atraso tipico GitHub ~1-2h = ~09:00-10:00
  workflow_dispatch:         # permite correr manualmente com um clique
    inputs:
      teste_email:
        description: 'Enviar email de teste (true/false)'
        default: 'false'

jobs:
  scrape:
    runs-on: windows-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Correr scraper
        shell: powershell
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TESTE_EMAIL: ${{ github.event.inputs.teste_email }}
        run: |
          powershell -NonInteractive -ExecutionPolicy Bypass `
            -File scripts/wells_scraper.ps1 `
            -OutputDir data

      - name: Gerar dashboard
        shell: powershell
        run: |
          powershell -NonInteractive -ExecutionPolicy Bypass `
            -File scripts/gerar_dashboard.ps1 `
            -DataDir data `
            -DashboardOut index.html

      - name: Guardar resultados no GitHub
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/TV3nda/Artsana.git"
          git add data/historico/wells_historico.csv index.html
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 1) {
            git commit -m "Scraper: $(Get-Date -Format 'yyyy-MM-dd')"
            $pushOut = git push origin master 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Push rejeitado. A buscar estado remoto e a forcar push..."
              git fetch origin master
              git push origin master --force-with-lease
            }
          } else {
            Write-Host "Sem alteracoes para guardar."
          }
